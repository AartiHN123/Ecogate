version: '3.9'

services:

  # ── EcoGate Proxy Server ────────────────────────────────────────────────────
  server:
    build:
      context: ./ecogate/server
      dockerfile: Dockerfile
    container_name: ecogate-server
    restart: unless-stopped
    ports:
      - "3000:3000"       # HTTP + WebSocket (ws://localhost:3000/ws)
    volumes:
      - ecogate_db:/app/data   # Persist SQLite DB across restarts
    environment:
      PORT: 3000
      # ── Provider API keys (copy from .env or set here) ──────────────────────
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      ZAI_API_KEY:       ${ZAI_API_KEY:-}
      GROQ_API_KEY:      ${GROQ_API_KEY:-}
      MISTRAL_API_KEY:   ${MISTRAL_API_KEY:-}
      TOGETHER_API_KEY:  ${TOGETHER_API_KEY:-}
      # ── Classifier (defaults to openai) ─────────────────────────────────────
      CLASSIFIER_PROVIDER: ${CLASSIFIER_PROVIDER:-openai}
      CLASSIFIER_MODEL:    ${CLASSIFIER_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── EcoGate Dashboard (uncomment when frontend is built) ────────────────────
  # dashboard:
  #   build:
  #     context: ./ecogate/dashboard
  #     dockerfile: Dockerfile
  #   container_name: ecogate-dashboard
