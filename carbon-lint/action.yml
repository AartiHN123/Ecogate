name: 'CarbonLint'
description: 'Analyzes code diffs for wasteful LLM usage patterns and posts a Green Score on every PR.'
author: 'EcoGate'

branding:
  icon: 'zap'
  color: 'green'

inputs:
  openai_api_key:
    description: 'OpenAI API key used to run the LLM diff analysis.'
    required: true
  model:
    description: 'Model to use for linting (should be a small/cheap model).'
    required: false
    default: 'gpt-4o-mini'
  github_token:
    description: 'GitHub token for posting PR comments. Use secrets.GITHUB_TOKEN.'
    required: true
  max_diff_chars:
    description: 'Maximum characters of diff to send to the LLM (prevents token overflows).'
    required: false
    default: '12000'

outputs:
  green_score:
    description: "Letter grade A–F representing LLM efficiency of the diff."
  issues_found:
    description: "Number of wasteful LLM patterns detected."

runs:
  using: 'node20'
  main: 'lint.js'
