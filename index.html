<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoGate — Setup & Install</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --text-muted: #888888;
      --accent: #22c55e;
      --font: 'IBM Plex Mono', monospace;
    }
    :root[data-theme='light'] {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; position: relative; transition: background 0.3s, color 0.3s; }
    .theme-toggle { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; background: transparent; border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); transition: 0.2s; }
    .theme-toggle:hover { border-color: var(--text-muted); background: var(--surface); }
    .container { max-width: 800px; padding: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; text-align: center; margin: 0 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); transition: background 0.3s, border-color 0.3s; width: 100%; }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; transition: color 0.3s; }
    .code-box { background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; gap: 16px; transition: background 0.3s, border-color 0.3s; }
    code { font-size: 0.85rem; color: var(--accent); white-space: nowrap; text-align: left; flex: 1; min-width: 0; transition: color 0.3s; padding-bottom: 2px; overflow-x: auto; }
    button.copy-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 0.85rem; transition: 0.2s; white-space: nowrap; flex-shrink: 0; }
    button.copy-btn:hover { border-color: var(--text-muted); background: var(--bg); color: var(--text); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle Theme">☀️</button>
  <div class="container">
    <h1>🌿 EcoGate Proxy</h1>
    <p>Run locally, route intelligently, reduce token emissions. Install the full CLI proxy & dashboard instantly with one command.</p>
    <div class="code-box">
      <code id="cmd">curl -sL https://raw.githubusercontent.com/AartiHN123/Ecogate/main/install.sh | bash</code>
      <button class="copy-btn" onclick="copyCmd(this)">Copy</button>
    </div>
  </div>
  <script>
    function copyCmd(btn) {
      navigator.clipboard.writeText(document.getElementById('cmd').innerText);
      btn.innerText = 'Copied!';
      setTimeout(() => btn.innerText = 'Copy', 2000);
    }

    function toggleTheme() {
      const root = document.documentElement;
      const isLight = root.getAttribute('data-theme') === 'light';
      root.setAttribute('data-theme', isLight ? 'dark' : 'light');
      document.getElementById('theme-btn').innerText = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'dark' : 'light');
    }

    // Initialize theme based on saved preference or system preference
    const savedTheme = localStorage.getItem('theme');
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    if (savedTheme === 'light' || (!savedTheme && prefersLight)) {
      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('theme-btn').innerText = '🌙';
    }
  </script>
</body>
</html>
